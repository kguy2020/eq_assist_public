<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EqAssist Solo — Coming Soon</title>
<meta name="description" content="EqAssist Solo is coming soon. Join the launch list to be the first to know when it's available.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Josefin+Sans:wght@300;400;500;600&family=Raleway:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-950:#0b1526;
    --navy-900:#0f1b30;
    --navy-800:#16253f;
    --gold-500:#c9a24c;
    --gold-400:#d9b66a;
    --gold-300:#e8cf9a;
    --cream-50:#f8f4ea;
    --max-w:1120px;
    --font-display:'Playfair Display', Georgia, serif;
    --font-body:'Josefin Sans', 'Segoe UI', sans-serif;
    --font-label:'Raleway', 'Segoe UI', sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--navy-950);
    color:var(--cream-50);
    font-family:var(--font-body);
    font-size:17px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    display:flex;
    flex-direction:column;
  }
  a{color:inherit;}
  h1,h2{font-family:var(--font-display);font-weight:600;margin:0;text-wrap:balance;}
  .eyebrow{
    font-family:var(--font-label);
    font-size:12.5px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--gold-400);
    font-weight:600;
  }
  .wrap{max-width:var(--max-w);margin:0 auto;padding:0 28px;width:100%;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  /* ---------- NAV ---------- */
  .nav{
    padding:20px 0;
    border-bottom:1px solid rgba(201,162,76,0.16);
  }
  .nav-inner{
    max-width:var(--max-w); margin:0 auto; padding:0 28px;
    display:flex; align-items:center; justify-content:center;
  }
  .brand{display:flex; align-items:center; gap:10px; text-decoration:none;}
  .brand img{width:30px;height:30px;flex-shrink:0;border-radius:6px;}
  .brand-word{font-family:var(--font-display); font-size:20px; color:var(--cream-50); letter-spacing:0.01em;}
  .brand-word b{color:var(--gold-400); font-weight:600;}

  /* ---------- MAIN ---------- */
  main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    padding:64px 28px;
    background:
      radial-gradient(ellipse 900px 500px at 50% 0%, rgba(201,162,76,0.14), transparent 60%),
      var(--navy-950);
    overflow:hidden;
  }
  .signup-card{
    position:relative;
    max-width:520px;
    width:100%;
    text-align:center;
  }
  .signup-card h1{
    font-size:clamp(30px, 4.4vw, 42px);
    color:var(--cream-50);
    margin:16px 0 14px;
  }
  .signup-card p.lede{
    font-size:16.5px; color:#b9b2a0; margin:0 0 36px;
  }

  .ml-form-shell{
    background:var(--navy-800); border:1px solid rgba(201,162,76,0.22);
    border-radius:18px; padding:32px; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:32px;
  }
  .ml-subscribe-btn{
    display:inline-flex; align-items:center; gap:10px;
    font-family:var(--font-label); font-weight:600; font-size:14px;
    letter-spacing:0.05em; text-transform:uppercase;
    color:var(--navy-950); background:linear-gradient(135deg, var(--gold-300), var(--gold-500));
    padding:16px 32px; border-radius:999px; text-decoration:none;
    box-shadow:0 10px 30px rgba(201,162,76,0.25);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .ml-subscribe-btn:hover{transform:translateY(-2px); box-shadow:0 14px 34px rgba(201,162,76,0.35);}
  .ml-subscribe-btn:focus-visible{outline:2px solid var(--gold-400); outline-offset:3px;}
  .ml-setup-note{
    margin:0; font-size:13px; color:#a9a290; font-family:var(--font-label);
  }

  /* ---------- FOOTER ---------- */
  footer{
    border-top:1px solid rgba(201,162,76,0.14);
    padding:28px 0;
  }
  .footer-inner{
    max-width:var(--max-w); margin:0 auto; padding:0 28px;
    display:flex; justify-content:center; align-items:center; flex-wrap:wrap; gap:16px 24px;
  }
  .footer-links{display:flex; gap:24px; flex-wrap:wrap;}
  .footer-links a{
    font-family:var(--font-label); font-size:13px; color:#9a927e;
    text-decoration:none; letter-spacing:0.02em;
  }
  .footer-links a:hover{color:var(--gold-400);}
  .footer-copy{font-size:12.5px; color:#6d6656; width:100%; margin-top:8px; font-family:var(--font-label); text-align:center;}

  @media (max-width: 520px){
    main{padding:48px 24px;}
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="brand" href="#top">
      <img src="assets/logo.png" alt="EqAssist Solo horse-head logo">
      <span class="brand-word">Eq<b>Assist</b> Solo</span>
    </a>
  </div>
</nav>

<main id="top">
  <div class="signup-card">
    <span class="eyebrow">Be first to know</span>
    <h1>Join the launch list</h1>
    <p class="lede">One email when EqAssist Solo goes live — nothing else, ever.</p>

    <div class="ml-form-shell">
      <a class="ml-subscribe-btn" href="https://eqassistsubscribers.beehiiv.com/" target="_blank" rel="noopener noreferrer">
        Subscribe for Launch Updates
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 17L17 7M17 7H9M17 7V15" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <p class="ml-setup-note">Opens EqAssist's subscribe page in a new tab — one email field, no account needed.</p>
    </div>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <div class="footer-links">
      <a href="eqassist-solo-privacy-policy.html">Privacy Policy</a>
      <a href="mailto:katierwguy2020@gmail.com">Contact</a>
    </div>
    <p class="footer-copy">&copy; 2026 CL Leisure Management.</p>
  </div>
</footer>

</body>
</html>
